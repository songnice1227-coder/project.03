name: Oppor 공고 자동 크롤링

on:
  # 매주 월·수·금 오전 9시 (KST = UTC+9, 즉 UTC 00:00)
  schedule:
    - cron: '0 0 * * 1,3,5'

  # GitHub 웹에서 수동 실행 버튼 추가
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: 패키지 설치
        run: pip install -r crawler/requirements.txt

      - name: 크롤러 실행
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python crawler/crawl.py
